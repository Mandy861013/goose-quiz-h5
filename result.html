<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>鹅腿杀 · 你的鹅圈段位</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;overscroll-behavior:none}
  body{
    background:#FFF8E7;
    background-image:
      radial-gradient(circle at 12% 18%, #FFB627 2px, transparent 3px),
      radial-gradient(circle at 78% 22%, #FF4D4D 2px, transparent 3px),
      radial-gradient(circle at 25% 75%, #7CB518 2px, transparent 3px),
      radial-gradient(circle at 88% 88%, #FFB627 2px, transparent 3px);
    background-size:120px 120px,160px 160px,140px 140px,180px 180px;
    color:#1A1A1A;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  .stage{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    padding:28px 22px 32px;
    position:relative;
    display:flex;
    flex-direction:column;
  }

  /* 漂浮装饰 */
  .deco{position:absolute;font-size:42px;z-index:0;pointer-events:none;animation:float 3s ease-in-out infinite}
  .d1{top:50px;left:18px;transform:rotate(-15deg)}
  .d2{top:80px;right:14px;transform:rotate(20deg);animation-delay:.5s}
  .d3{top:280px;left:0;font-size:32px;transform:rotate(-25deg);animation-delay:1s}
  .d4{top:320px;right:8px;font-size:36px;transform:rotate(15deg);animation-delay:1.5s}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(var(--r,0))}
    50%{transform:translateY(-10px) rotate(var(--r,0))}
  }

  /* 顶部小贴纸 */
  .top-tag{
    align-self:center;
    background:#1A1A1A;
    color:#FFB627;
    font-weight:900;
    font-size:12px;
    padding:6px 14px;
    border-radius:20px;
    letter-spacing:2px;
    box-shadow:3px 3px 0 #FF4D4D;
  }

  /* 段位卡 */
  .rank-card{
    margin-top:24px;
    background:#fff;
    border:4px solid #1A1A1A;
    border-radius:24px;
    padding:32px 24px 28px;
    text-align:center;
    box-shadow:8px 8px 0 #1A1A1A;
    position:relative;
    z-index:1;
  }
  .rank-emoji{
    font-size:96px;
    line-height:1;
    display:inline-block;
    animation:wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%,100%{transform:rotate(-6deg)}
    50%{transform:rotate(6deg)}
  }
  .rank-title{
    margin-top:14px;
    font-size:36px;
    font-weight:900;
    letter-spacing:1px;
    color:#1A1A1A;
    text-shadow:3px 3px 0 #FFB627;
    display:inline-block;
    transform:rotate(-1.5deg);
  }
  .rank-desc{
    margin-top:18px;
    font-size:14px;
    color:#666;
    font-weight:700;
    line-height:1.6;
    padding:0 8px;
  }

  /* 分数环 */
  .score-block{
    margin-top:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
  }
  .score-circle{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#FFB627;
    border:4px solid #1A1A1A;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:4px 4px 0 #1A1A1A;
    transform:rotate(-4deg);
  }
  .score-num{
    font-size:42px;
    font-weight:900;
    line-height:1;
    color:#1A1A1A;
  }
  .score-unit{
    font-size:12px;
    font-weight:800;
    margin-top:4px;
    letter-spacing:1px;
  }
  .score-meta{flex:1;text-align:left}
  .meta-line{
    font-size:13px;
    font-weight:700;
    color:#1A1A1A;
    margin-bottom:6px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .meta-line .dot{
    display:inline-block;
    width:8px;height:8px;
    border-radius:50%;
    background:#FF4D4D;
  }
  .meta-line b{color:#FF4D4D;font-size:15px}

  /* 数据三件套 */
  .stats{
    margin-top:22px;
    display:flex;
    gap:10px;
  }
  .stat{
    flex:1;
    background:#fff;
    border:3px solid #1A1A1A;
    border-radius:14px;
    padding:14px 8px;
    text-align:center;
    box-shadow:3px 3px 0 #1A1A1A;
  }
  .stat:nth-child(1){background:#7CB518;color:#fff;transform:rotate(-2deg)}
  .stat:nth-child(2){background:#FF4D4D;color:#fff;transform:rotate(1.5deg)}
  .stat:nth-child(3){background:#FFB627;transform:rotate(-1deg)}
  .stat-num{font-size:22px;font-weight:900;line-height:1}
  .stat-label{font-size:11px;font-weight:700;margin-top:6px}

  /* 名言贴纸 */
  .quote{
    margin-top:22px;
    background:#1A1A1A;
    color:#FFF8E7;
    border-radius:16px;
    padding:16px 18px;
    position:relative;
    transform:rotate(-1deg);
    box-shadow:5px 5px 0 #FFB627;
  }
  .quote::before{
    content:"📢";
    position:absolute;
    top:-14px;
    left:14px;
    font-size:28px;
  }
  .quote-text{
    font-size:14px;
    font-weight:700;
    line-height:1.5;
    padding-left:30px;
  }

  /* 按钮组 */
  .btn-group{
    margin-top:auto;
    padding-top:24px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .btn{
    border:none;
    border-radius:50px;
    padding:18px;
    font-size:17px;
    font-weight:900;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    letter-spacing:1px;
  }
  .btn-share{
    background:#FF4D4D;
    color:#fff;
    box-shadow:5px 5px 0 #1A1A1A;
  }
  .btn-share:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #1A1A1A}
  .btn-row{display:flex;gap:10px}
  .btn-replay{
    flex:1;
    background:#1A1A1A;
    color:#FFB627;
    box-shadow:4px 4px 0 #FFB627;
  }
  .btn-home{
    flex:1;
    background:#fff;
    color:#1A1A1A;
    border:3px solid #1A1A1A;
    box-shadow:4px 4px 0 #1A1A1A;
  }
  .btn-replay:active,.btn-home:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #1A1A1A}

  /* 撒花 */
  .confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:14px;
    z-index:200;
    pointer-events:none;
    animation:fall 3s linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* ====== 分享海报样式 ====== */
  .poster-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
    align-items:center;justify-content:center;padding:20px;
  }
  .poster-overlay.show{display:flex}
  .poster-wrap{
    position:relative;width:360px;border-radius:16px;overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,.4);animation:posterIn .35s ease;
  }
  @keyframes posterIn{
    from{transform:scale(.85);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  .poster-canvas{display:block;width:100%;height:auto}
  .poster-tip{
    margin-top:16px;text-align:center;color:#fff;font-size:14px;
    font-weight:700;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .poster-close{
    position:absolute;top:-12px;right:-12px;width:36px;height:36px;
    border-radius:50%;background:#fff;border:3px solid #1A1A1A;
    font-size:18px;font-weight:900;display:flex;align-items:center;
    justify-content:center;cursor:pointer;z-index:10;box-shadow:2px 2px 0 #1A1A1A;
  }
  .poster-close:active{transform:scale(.92)}
  .poster-actions{
    margin-top:14px;display:flex;gap:10px;justify-content:center;
  }
  .poster-actions button{
    border:none;border-radius:30px;padding:10px 24px;font-size:14px;
    font-weight:900;cursor:pointer;letter-spacing:1px;
  }
  .btn-dl{
    background:#7CB518;color:#fff;box-shadow:3px 3px 0 #1A1A1A;
  }
  .btn-dl:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #1A1A1A}
  .btn-copy{
    background:#FFB627;color:#1A1A1A;box-shadow:3px 3px 0 #1A1A1A;
  }
  .btn-copy:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #1A1A1A}

  /* 海报生成中 loading */
  .poster-loading{
    display:none;position:fixed;inset:0;z-index:500;
    background:rgba(255,248,231,.95);
    flex-direction:column;align-items:center;justify-content:center;
    gap:16px;
  }
  .poster-loading.show{display:flex}
  .loading-spinner{
    width:48px;height:48px;border:5px solid #FFB627;
    border-top-color:#FF4D4D;border-radius:50%;
    animation:spin .6s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:16px;font-weight:900;color:#1A1A1A}
</style>
</head>
<body>
<div class="stage">
  <span class="deco d1">🎉</span>
  <span class="deco d2">🍗</span>
  <span class="deco d3">⭐</span>
  <span class="deco d4">💸</span>

  <span class="top-tag">🏆 鹅圈段位鉴定结果</span>

  <div class="rank-card">
    <span class="rank-emoji" id="rankEmoji">🦢</span>
    <div class="rank-title" id="rankTitle">鹅腿杀神</div>
    <div class="rank-desc" id="rankDesc">恭喜你，鹅圈一哥就是你！</div>

    <div class="score-block">
      <div class="score-circle">
        <div class="score-num" id="scoreNum">100</div>
        <div class="score-unit">分</div>
      </div>
      <div class="score-meta">
        <div class="meta-line"><span class="dot"></span>含鹅量：<b id="gooseRatio">120%</b></div>
        <div class="meta-line"><span class="dot"></span>击败：<b id="beatRate">99%</b> 鹅圈玩家</div>
        <div class="meta-line"><span class="dot"></span>段位：<b id="rankShort">王者</b></div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="rightCnt">5</div>
      <div class="stat-label">答对题数</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="wrongCnt">0</div>
      <div class="stat-label">答错题数</div>
    </div>
    <div class="stat">
      <div class="stat-num">15s</div>
      <div class="stat-label">平均用时</div>
    </div>
  </div>

  <div class="quote">
    <div class="quote-text" id="quoteText">"鹅腿在手，天下我有。今晚的食堂，不香了。"</div>
  </div>

  <div class="btn-group">
    <button class="btn btn-share" onclick="generatePoster()">🖼️ 生成分享海报</button>
    <div class="btn-row">
      <button class="btn btn-replay" onclick="replay()">🔁 再杀一把</button>
      <button class="btn btn-home" onclick="home()">🏠 返回首页</button>
    </div>
  </div>

  <!-- 海报生成中 -->
  <div class="poster-loading" id="posterLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在生成你的专属海报...</div>
  </div>

  <!-- 海报预览弹窗 -->
  <div class="poster-overlay" id="posterOverlay" onclick="closePoster(event)">
    <div class="poster-wrap" id="posterWrap">
      <button class="poster-close" onclick="closePosterDirect()" title="关闭">✕</button>
      <canvas class="poster-canvas" id="posterCanvas" width="720" height="1080"></canvas>
    </div>
    <div style="text-align:center">
      <div class="poster-tip">👆 长按图片保存，发朋友圈秀一波！</div>
      <div class="poster-actions">
        <button class="btn-dl" onclick="downloadPoster()">💾 保存图片</button>
        <button class="btn-copy" onclick="copyPosterLink()">🔗 复制链接</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 读取得分
  let score = 0;
  try{score = parseInt(localStorage.getItem('goose_score')||'0',10)}catch(e){}
  if(isNaN(score)) score = 0;

  const TOTAL = 5;
  const PER = 20;
  const right = Math.round(score/PER);
  const wrong = TOTAL - right;

  // 根据分数推段位
  function getRank(s){
    if(s>=100) return {
      emoji:"👑", title:"鹅腿杀神",
      desc:"5/5 全对！鹅圈的传说就是你，建议立刻去鹅腿阿姨摊位前接受加冕。",
      ratio:"120%", beat:"99%", short:"王者",
      quote:"\"鹅腿在手，天下我有。今晚的食堂，瞬间不香了。\"",
      color:"#FFD700", bgGrad:["#1A1A2E","#16213E"]
    };
    if(s>=80) return {
      emoji:"🔥", title:"鹅圈红人",
      desc:"含鹅量爆表，朋友圈晒鹅腿绝对没人能盖你的风头。",
      ratio:"95%", beat:"88%", short:"星耀",
      quote:"\"少壮不努力，长大没鹅吃。还好你年轻有为。\"",
      color:"#FF6B35", bgGrad:["#2D1B00","#4A2800"]
    };
    if(s>=60) return {
      emoji:"😎", title:"鹅道有缘人",
      desc:"勉强算个鹅圈中产，再多排几次队你就能晋级了。",
      ratio:"68%", beat:"65%", short:"钻石",
      quote:"\"今天的鹅腿，明天的我。继续修行吧。\"",
      color:"#7CB518", bgGrad:["#0A2000","#144400"]
    };
    if(s>=40) return {
      emoji:"🤔", title:"鹅圈萌新",
      desc:"刚入鹅道，建议先去蹲三天点，背熟阿姨的出摊时刻表。",
      ratio:"42%", beat:"38%", short:"黄金",
      quote:"\"路漫漫其修远兮，吾将上下而抢鹅。\"",
      color:"#FFB627", bgGrad:["#2B1E00","#453000"]
    };
    return {
      emoji:"😅", title:"鹅腿门外汉",
      desc:"你是不是连鹅腿阿姨长什么样都不知道？速去补课。",
      ratio:"15%", beat:"12%", short:"青铜",
      quote:"\"鹅腿一根千金难买，今天的你输得明明白白。\"",
      color:"#999", bgGrad:["#222","#333"]
    };
  }

  const r = getRank(score);
  document.getElementById('rankEmoji').textContent = r.emoji;
  document.getElementById('rankTitle').textContent = r.title;
  document.getElementById('rankDesc').textContent = r.desc;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('gooseRatio').textContent = r.ratio;
  document.getElementById('beatRate').textContent = r.beat;
  document.getElementById('rankShort').textContent = r.short;
  document.getElementById('rightCnt').textContent = right;
  document.getElementById('wrongCnt').textContent = wrong;
  document.getElementById('quoteText').textContent = r.quote;

  // 撒花 (高分专属)
  if(score>=80){
    const colors = ['#FFB627','#FF4D4D','#7CB518','#1A1A1A'];
    for(let i=0;i<40;i++){
      setTimeout(()=>{
        const c = document.createElement('div');
        c.className='confetti';
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration = (2 + Math.random()*2) + 's';
        c.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
      }, i*60);
    }
  }

  // ====== 分享海报生成（纯 Canvas 绘制）======
  function generatePoster(){
    const loading = document.getElementById('posterLoading');
    loading.classList.add('show');

    // 用 requestAnimationFrame 确保 loading 显示后再绘制
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        drawPoster();
        loading.classList.remove('show');
        document.getElementById('posterOverlay').classList.add('show');
      });
    });
  }

  function drawPoster(){
    const cv = document.getElementById('posterCanvas');
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;

    // ---- 背景渐变 ----
    const bgGrad = ctx.createLinearGradient(0,0,W,H);
    bgGrad.addColorStop(0, r.bgGrad[0]);
    bgGrad.addColorStop(1, r.bgGrad[1]);
    ctx.fillStyle = bgGrad;
    roundRect(ctx,0,0,W,H,0,true,false);

    // ---- 背景装饰圆 ----
    ctx.globalAlpha = .12;
    ctx.fillStyle = '#FFB627';
    ctx.beginPath();ctx.arc(W*0.85,H*0.08,120,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = '#FF4D4D';
    ctx.beginPath();ctx.arc(W*0.1,H*0.9,100,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = '#7CB518';
    ctx.beginPath();ctx.arc(W*0.88,H*0.82,80,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha = 1;

    // ---- 背景点阵装饰 ----
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    for(let px=30;px<W;px+=50){
      for(let py=30;py<H;py+=50){
        ctx.beginPath();ctx.arc(px+((py/50)%2)*25,py,3,0,Math.PI*2);ctx.fill();
      }
    }

    // ---- 顶部标签条 ----
    const tagY = 56;
    ctx.fillStyle = 'rgba(255,255,255,.15)';
    roundRect(ctx,40,tagY-22,W-80,44,22,true,false);
    ctx.fillStyle = '#FFB627';
    ctx.font = 'bold 26px "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏆 鹅圈段位鉴定报告', W/2, tagY);

    // ---- 主卡片 ----
    const cardX = 46, cardY = 110, cardW = W-92, cardH = 520;
    // 卡片阴影
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    roundRect(ctx,cardX+8,cardY+8,cardW,cardH,28,true,false);
    // 卡片主体
    const cardGrad = ctx.createLinearGradient(cardX,cardY,cardX,cardY+cardH);
    cardGrad.addColorStop(0, '#FFFFFF');
    cardGrad.addColorStop(1, '#F8F3E8');
    ctx.fillStyle = cardGrad;
    roundRect(ctx,cardX,cardY,cardW,cardH,28,true,false);

    // 卡片顶部装饰线
    ctx.fillStyle = r.color;
    roundRect(ctx,cardX,cardY,cardW,8,28,false,false);
    roundRect(ctx,cardX,cardY,cardW,8,[28,0,0,0],true,false);

    // ---- 段位 Emoji（大）----
    ctx.font = '100px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(r.emoji, W/2, cardY + 90);

    // ---- 段位标题 ----
    ctx.fillStyle = '#1A1A1A';
    ctx.font = '900 52px "PingFang SC", sans-serif';
    ctx.fillText(r.title, W/2, cardY + 175);

    // 段位标题下方描边效果
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 2;
    ctx.strokeText(r.title, W/2, cardY + 175);

    // ---- 分数大字 ----
    const scoreCX = W/2, scoreCY = cardY + 270;

    // 分数背景圆
    ctx.fillStyle = r.color;
    ctx.beginPath();ctx.arc(scoreCX,scoreCY,64,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = '#1A1A1A';
    ctx.beginPath();ctx.arc(scoreCX,scoreCY,58,0,Math.PI*2);ctx.fill();
    // 分数字
    ctx.fillStyle = '#FFF';
    ctx.font = '900 56px "PingFang SC", sans-serif';
    ctx.fillText(score, scoreCX, scoreCY + 6);
    // "分"
    ctx.font = '800 22px "PingFang SC", sans-serif';
    ctx.fillStyle = r.color;
    ctx.fillText('分', scoreCX + 48, scoreCY - 16);

    // ---- 数据行 ----
    const dataY = cardY + 370;
    const dataItems = [
      {label:'含鹅量', value: r.ratio},
      {label:'击败',   value: r.beat+' 玩家'},
      {label:'段位',   value: r.short}
    ];
    const itemW = (cardW - 48) / 3;
    dataItems.forEach((item,i)=>{
      const ix = cardX + 24 + i * itemW + itemW/2;
      // 小圆点
      ctx.fillStyle = '#FF4D4D';
      ctx.beginPath();ctx.arc(ix-36,dataY-8,6,0,Math.PI*2);ctx.fill();
      // 标签
      ctx.fillStyle = '#888';
      ctx.font = '700 22px "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(item.label, ix-14, dataY-8);
      // 值
      ctx.fillStyle = '#FF4D4D';
      ctx.font = '900 26px "PingFang SC", sans-serif';
      ctx.fillText(item.value, ix, dataY+26);
    });

    // ---- 名言区域 ----
    const quoteY = cardY + 440;
    ctx.fillStyle = '#1A1A1A';
    roundRect(ctx,cardX+20,quoteY,cardW-40,62,14,true,false);
    ctx.fillStyle = '#FFF8E7';
    ctx.font = '600 21px "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    // 截断过长的名言
    let qText = r.quote.replace(/"/g,'');
    if(qText.length > 20) qText = qText.slice(0,20)+'...';
    ctx.fillText(qText, W/2, quoteY + 35);

    // ---- 底部数据三件套 ----
    const statY = cardY + cardH + 32;
    const statW = (cardW - 24) / 3;
    const statData = [
      {num: String(right), label:'答对', color:'#7CB518'},
      {num: String(wrong), label:'答错', color:'#FF4D4D'},
      {num: '5题', label:'总题', color:'#FFB627'}
    ];
    statData.forEach((st,i)=>{
      const sx = cardX + 12 + i * (statW + 8);
      ctx.fillStyle = st.color;
      roundRect(ctx,sx,statY,statW,76,16,true,false);
      ctx.fillStyle = i===1 ? '#fff' : '#1A1A1A';
      ctx.font = '900 34px "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(st.num, sx+statW/2, statY + 38);
      ctx.font = '700 19px "PingFang SC", sans-serif';
      ctx.fillText(st.label, sx+statW/2, statY + 63);
    });

    // ---- 底部引导区 ----
    const footY = H - 160;
    // 底部卡片
    ctx.fillStyle = 'rgba(255,255,255,.1)';
    roundRect(ctx,40,footY,W-80,120,20,true,false);

    // 二维码占位区域
    const qrSize = 86;
    const qrX = W - 140, qrY = footY + 17;
    ctx.fillStyle = '#fff';
    roundRect(ctx,qrX,qrY,qrSize,qrSize,10,true,false);
    // 二维码内图案示意
    ctx.fillStyle = '#1A1A1A';
    ctx.fillRect(qrX+10,qrY+10,qrSize-20,qrSize-20);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GOOSE', qrX+qrSize/2, qrY+qrSize/2-4);
    ctx.fillText('QUIZ', qrX+qrSize/2, qrY+qrSize/2+10);

    // 扫码文字
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.font = '500 18px "PingFang SC", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('扫码挑战', qrX+qrSize/2, qrY+qrSize+22);

    // 左侧引导文案
    ctx.fillStyle = '#FFF';
    ctx.font = '900 34px "PingFang SC", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🦢 鹅圈等你来战！', 68, footY + 42);
    ctx.font = '700 21px "PingFang SC", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    ctx.fillText('测测你的「含鹅量」有多高', 68, footY + 78);

    // ---- 最底部小字 ----
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.font = '400 16px "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('— 鹅腿研究所 出品 —', W/2, H - 28);
  }

  // 圆角矩形辅助函数
  function roundRect(ctx,x,y,w,h,r,fill,stroke){
    if(typeof r==='number') r=[r,r,r,r];
    ctx.beginPath();
    ctx.moveTo(x+r[0],y);
    ctx.lineTo(x+w-r[1],y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r[1]);
    ctx.lineTo(x+w,y+h-r[2]);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);
    ctx.lineTo(x+r[3],y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r[3]);
    ctx.lineTo(x,y+r[0]);
    ctx.quadraticCurveTo(x,y,x+r[0],y);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  // 关闭海报
  function closePoster(e){
    if(e.target.id==='posterOverlay'){
      document.getElementById('posterOverlay').classList.remove('show');
    }
  }
  function closePosterDirect(){
    document.getElementById('posterOverlay').classList.remove('show');
  }

  // 下载海报
  function downloadPoster(){
    const cv = document.getElementById('posterCanvas');
    const link = document.createElement('a');
    link.download = '鹅圈段位_'+r.title+'_'+score+'.png';
    link.href = cv.toDataURL('image/png',1.0);
    link.click();
  }

  // 复制链接（统一通过 share.html 分享入口）
  function copyPosterLink(){
    const baseUrl = location.href.replace(/\/result\.html.*$/, '/share.html');
    if(navigator.clipboard){
      navigator.clipboard.writeText(baseUrl).then(()=>{
        alert('✅ 链接已复制！快发给好友来挑战吧！');
      }).catch(()=>fallbackCopy(baseUrl));
    } else {
      fallbackCopy(baseUrl);
    }
  }
  function fallbackCopy(text){
    const ta=document.createElement('textarea');ta.value=text;
    ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');alert('✅ 链接已复制！')}catch(e){alert('链接：\n'+text)}
    document.body.removeChild(ta);
  }

  function replay(){
    try{localStorage.removeItem('goose_score')}catch(e){}
    location.href='quiz.html';
  }
  function home(){
    try{localStorage.clear()}catch(e){}
    location.href='index.html';
  }
</script>
