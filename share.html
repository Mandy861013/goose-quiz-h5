<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
body{
  background:#FFF8E7;
  background-image:
    radial-gradient(circle at 15% 20%, #FFB627 2px, transparent 3px),
    radial-gradient(circle at 85% 30%, #FF4D4D 2px, transparent 3px),
    radial-gradient(circle at 25% 80%, #7CB518 2px, transparent 3px);
  background-size:150px 150px,180px 180px,160px 160px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;max-width:380px;
  background:#fff;
  border:4px solid #1A1A1A;
  border-radius:28px;
  overflow:hidden;
  box-shadow:10px 10px 0 #1A1A1A;
  animation:cardIn .5s ease;
}
@keyframes cardIn{
  from{transform:scale(.9) translateY(20px);opacity:0}
  to{transform:scale(1) translateY(0);opacity:1}
}

/* 封面图区域 */
.cover{
  position:relative;
  height:200px;
  background:linear-gradient(135deg, #FFB627 0%, #FF4D4D 50%, #7CB518 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.cover::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.2) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,.1) 0%, transparent 50%);
}
.cover-emoji{font-size:72px;z-index:1;text-shadow:4px 4px 0 #1A1A1A}
.cover-title{
  font-size:36px;font-weight:900;color:#fff;
  text-shadow:3px 3px 0 #1A1A1A;
  margin-top:8px;z-index:1;letter-spacing:2px
}
.cover-sub{
  font-size:14px;font-weight:800;color:rgba(255,255,255,.9);
  margin-top:6px;z-index:1
}

/* 内容区域 */
.body{padding:24px 20px 28px;text-align:center}

.tag{
  display:inline-block;background:#FF4D4D;color:#fff;
  font-size:12px;font-weight:900;padding:5px 14px;border-radius:16px;
  transform:rotate(-2deg);margin-bottom:16px;
  letter-spacing:1px;box-shadow:2px 2px 0 #1A1A1A;
}

.desc{
  font-size:17px;font-weight:700;color:#333;line-height:1.6;margin-bottom:8px
}
.hint{
  font-size:13px;color:#999;font-weight:600;margin-bottom:22px
}

/* 数据条 */
.stats-row{
  display:flex;gap:8px;margin-bottom:24px
}
.stat-item{
  flex:1;background:#f8f8f8;border:2px solid #1A1A1A;
  border-radius:12px;padding:10px 6px;text-align:center;
}
.stat-num{font-size:22px;font-weight:900;color:#FF4D4D;line-height:1}
.stat-lbl{font-size:11px;font-weight:700;color:#888;margin-top:2px}

/* CTA 按钮 */
.cta{
  width:100%;padding:18px;border:none;border-radius:50px;
  background:#1A1A1A;color:#FFB627;font-size:20px;font-weight:900;
  cursor:pointer;letter-spacing:2px;
  box-shadow:5px 5px 0 #FF4D4D;
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.cta:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #FF4D4D}
.cta .arrow{display:inline-block;margin-left:6px;animation:slide .8s ease-in-out infinite}
@keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

/* 底部提示 */
.footer{
  text-align:center;margin-top:18px;font-size:12px;color:#bbb;font-weight:600
}
.footer b{color:#FF4D4D}

/* 装饰emoji */
.deco{
  position:fixed;font-size:36px;z-index:0;pointer-events:none;opacity:.5
}
.d1{top:40px;left:16px;animation:flo 3s ease-in-out infinite}
.d2{top:60px;right:12px;animation:flo 3.5s ease-in-out infinite reverse}
.d3{bottom:50px;left:20px;animation:flo 4s ease-in-out infinite}
.d4{bottom:40px;right:16px;animation:flo 3s ease-in-out infinite .8s}
@keyframes flo{0%,100%{transform:translateY(0) rotate(var(--r,0))}50%{transform:translateY(-8px) rotate(var(--r,0))}}
</style>
</head>
<body>
<span class="deco d1" style="--r:-15deg">🍗</span>
<span class="deco d2" style="--r:20deg">🔥</span>
<span class="deco d3" style="--r:-25deg">⭐</span>
<span class="deco d4" style="--r:15deg">💸</span>

<div class="card">
  <!-- 封面 -->
  <div class="cover">
    <div class="cover-emoji">🦢</div>
    <div class="cover-title">鹅 腿 杀</div>
    <div class="cover-sub">你够格当鹅圈一哥吗？</div>
  </div>

  <!-- 内容 -->
  <div class="body">
    <div class="tag">🔥 全网最离谱 · 鹅圈测试</div>
    <div class="desc">10 道题库 · 随机派题<br>测测你的「含鹅量」有多高</div>
    <div class="hint">⏱️ 每题 60 秒倒计时 · 看你什么段位</div>

    <div class="stats-row">
      <div class="stat-item"><div class="stat-num">10</div><div class="stat-lbl">题库</div></div>
      <div class="stat-item"><div class="stat-num">5</div><div class="stat-lbl">随机派</div></div>
      <div class="stat-item"><div class="stat-num">60s</div><div class="stat-lbl">限时</div></div>
    </div>

    <button class="cta" onclick="enter()">🚀 立即挑战 <span class="arrow">→</span></button>
    <div class="footer">本测试由 <b>鹅腿研究所</b> 联合宇宙鹅厂出品</div>
  </div>
</div>

<script>
  function enter(){
    location.href = 'index.html';
  }

</script>
