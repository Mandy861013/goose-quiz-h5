<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>鹅腿杀 · 你够格当鹅圈一哥吗？</title>

<meta property="og:type" content="website">

<!-- Twitter Card (X) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="🦢 鹅腿杀 · 你够格当鹅圈一哥吗？">
<meta name="twitter:description" content="10道题库随机挑战！测测你的「含鹅量」有多高">

<!-- 微信 / QQ 分享优化 -->
<meta itemprop="name" content="🦢 鹅腿杀 · 你够格当鹅圈一哥吗？">
<meta itemprop="description" content="10道题库随机挑战！测测你的含鹅量有多高 🔥">
<meta itemprop="image" content="https://mandy861013.github.io/goose-quiz-h5/assets/og-image.svg">

<!-- 微信内置浏览器识别 -->
<meta name="description" content="鹅腿杀 - 10道题库随机答题H5，测测你的含鹅量有多高！快来挑战你的鹅圈段位吧！">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;overscroll-behavior:none}
  body{
    background:#FFF8E7;
    background-image:
      radial-gradient(circle at 10% 20%, #FFB627 2px, transparent 3px),
      radial-gradient(circle at 80% 30%, #FF4D4D 2px, transparent 3px),
      radial-gradient(circle at 30% 70%, #7CB518 2px, transparent 3px),
      radial-gradient(circle at 90% 85%, #FFB627 2px, transparent 3px);
    background-size:120px 120px,160px 160px,140px 140px,180px 180px;
    color:#1A1A1A;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  .stage{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    padding:32px 24px 40px;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  /* 顶部贴纸 */
  .top-tag{
    align-self:flex-start;
    background:#1A1A1A;
    color:#FFB627;
    font-weight:900;
    font-size:13px;
    padding:6px 14px;
    border-radius:20px;
    transform:rotate(-4deg);
    letter-spacing:1px;
    box-shadow:3px 3px 0 #FF4D4D;
  }
  .emoji-float{
    position:absolute;
    font-size:48px;
    z-index:0;
    pointer-events:none;
  }
  .e1{top:60px;right:20px;transform:rotate(15deg);animation:bob 3s ease-in-out infinite}
  .e2{top:180px;left:10px;transform:rotate(-20deg);animation:bob 3.5s ease-in-out infinite reverse}
  .e3{bottom:280px;right:30px;font-size:36px;transform:rotate(8deg);animation:bob 4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(var(--r,0))}50%{transform:translateY(-12px) rotate(var(--r,0))}}

  /* 主标题区域 */
  .hero{
    margin-top:30px;
    text-align:center;
    position:relative;
    z-index:1;
  }
  .title-main{
    font-size:72px;
    font-weight:900;
    line-height:1;
    color:#1A1A1A;
    letter-spacing:-2px;
    text-shadow:
      4px 4px 0 #FFB627,
      8px 8px 0 #FF4D4D;
    transform:rotate(-2deg);
    display:inline-block;
  }
  .title-sub{
    margin-top:24px;
    background:#1A1A1A;
    color:#FFF8E7;
    display:inline-block;
    padding:8px 18px;
    font-size:18px;
    font-weight:800;
    border-radius:6px;
    transform:rotate(1.5deg);
  }
  .title-tip{
    margin-top:14px;
    font-size:14px;
    color:#666;
    font-weight:600;
  }
  .title-tip span{color:#FF4D4D;font-weight:900}

  /* 鹅腿插画卡片 */
  .goose-card{
    margin:34px auto 0;
    background:#fff;
    border:4px solid #1A1A1A;
    border-radius:24px;
    width:240px;
    height:240px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    box-shadow:8px 8px 0 #1A1A1A;
    transform:rotate(-3deg);
  }
  .goose-card::before{
    content:"今日鹅腿剩 3 根";
    position:absolute;
    top:-14px;
    left:50%;
    transform:translateX(-50%) rotate(2deg);
    background:#FF4D4D;
    color:#fff;
    padding:4px 12px;
    border-radius:14px;
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
    border:2px solid #1A1A1A;
  }
  .goose-emoji{font-size:140px;line-height:1;animation:wiggle 2s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .price-tag{
    position:absolute;
    bottom:-12px;
    right:-12px;
    background:#FFB627;
    border:3px solid #1A1A1A;
    border-radius:50%;
    width:64px;
    height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:14px;
    transform:rotate(15deg);
    color:#1A1A1A;
  }

  /* 规则三件套 */
  .rules{
    margin-top:48px;
    display:flex;
    gap:10px;
    justify-content:center;
  }
  .rule{
    flex:1;
    background:#fff;
    border:3px solid #1A1A1A;
    border-radius:14px;
    padding:12px 8px;
    text-align:center;
    box-shadow:3px 3px 0 #1A1A1A;
  }
  .rule:nth-child(1){transform:rotate(-2deg);background:#FFB627}
  .rule:nth-child(2){transform:rotate(1deg);background:#FF4D4D;color:#fff}
  .rule:nth-child(3){transform:rotate(-1deg);background:#7CB518;color:#fff}
  .rule-num{font-size:24px;font-weight:900;line-height:1}
  .rule-text{font-size:11px;font-weight:700;margin-top:6px;line-height:1.3}

  /* 开始按钮 */
  .start-btn{
    margin-top:auto;
    background:#1A1A1A;
    color:#FFB627;
    border:none;
    border-radius:50px;
    padding:22px;
    font-size:22px;
    font-weight:900;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:6px 6px 0 #FF4D4D;
    transition:transform .15s, box-shadow .15s;
    position:relative;
    z-index:2;
  }
  .start-btn:active{
    transform:translate(4px,4px);
    box-shadow:2px 2px 0 #FF4D4D;
  }
  .start-btn .arrow{
    display:inline-block;
    margin-left:8px;
    animation:slide 1s ease-in-out infinite;
  }
  @keyframes slide{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

  /* 底部小字 */
  .footer{
    margin-top:18px;
    text-align:center;
    font-size:12px;
    color:#999;
    font-weight:600;
  }
  .footer b{color:#FF4D4D}
</style>
</head>
<body>
<div class="stage">
  <span class="top-tag">🔥 全网最离谱 · 鹅圈测试</span>

  <span class="emoji-float e1">🦢</span>
  <span class="emoji-float e2">🍗</span>
  <span class="emoji-float e3">💸</span>

  <div class="hero">
    <div class="title-main">鹅腿杀</div>
    <div class="title-sub">你够格当鹅圈一哥吗？</div>
    <div class="title-tip">10 题库随机 5 道，看你 <span>含鹅量</span> 有多高</div>
  </div>

  <div class="goose-card">
    <span class="goose-emoji">🍗</span>
    <span class="price-tag">15<br>元/根</span>
  </div>

  <div class="rules">
    <div class="rule">
      <div class="rule-num">10</div>
      <div class="rule-text">道题库</div>
    </div>
    <div class="rule">
      <div class="rule-num">5</div>
      <div class="rule-text">随机派题</div>
    </div>
    <div class="rule">
      <div class="rule-num">60s</div>
      <div class="rule-text">单题倒计时</div>
    </div>
  </div>

  <button class="start-btn" onclick="go()">
    🚀 杀进鹅圈 <span class="arrow">→</span>
  </button>

  <div class="footer">本测试由 <b>鹅腿研究所</b> 联合宇宙鹅厂出品</div>
</div>

<script>
  function go(){
    try{localStorage.removeItem('goose_score');localStorage.removeItem('goose_idx')}catch(e){}
    location.href='quiz.html';
  }
</script>
</body>
</html>
